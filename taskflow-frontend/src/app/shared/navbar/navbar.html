<nav class="navbar">

  <!-- Brand -->
  <a class="nav-brand" routerLink="/dashboard">
    <div class="nav-logo-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 11l3 3L22 4"/>
        <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
      </svg>
    </div>
    <span class="nav-logo-text">TaskFlow</span>
  </a>

  <!-- Desktop Nav Links -->
  <div class="nav-links" [class.open]="menuOpen">
    <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
    <a *appHasRole="['ADMIN','MANAGER','MEMBER']" class="nav-link" routerLink="/teams" routerLinkActive="active">Teams</a>
    <a *appHasRole="['ADMIN']" class="nav-link" routerLink="/admin" routerLinkActive="active">Admin</a>
    <a class="nav-link" routerLink="/settings" routerLinkActive="active">Settings</a>
  </div>

  <!-- Right: Avatar Dropdown + hamburger -->
  <div class="nav-right">
    <!-- Dark Mode Toggle -->
    <button class="nav-icon-btn" (click)="toggleTheme()" title="Toggle Theme">
      @if (themeService.currentTheme() === 'DARK') {
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="4.22" x2="19.78" y2="5.64"/>
        </svg>
      } @else {
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      }
    </button>

    <!-- User Info + Avatar Dropdown -->
    <div class="avatar-dropdown-wrap" (click)="toggleDropdown($event)" (focusout)="closeDropdown()" tabindex="0">
      <div class="nav-user-info">
        <span class="role-badge" [class]="getRoleBadgeClass(currentUser?.role)">{{ currentUser?.role }}</span>
        <div class="avatar-circle nav-avatar" [style.background]="avatarColor">{{ initials }}</div>
        <span class="nav-user-name">{{ currentUser?.fullName }}</span>
      </div>
      @if (dropdownOpen) {
        <div class="avatar-dropdown" (mousedown)="$event.preventDefault()">
          <div class="dropdown-user">
            <div class="avatar-circle dropdown-avatar" [style.background]="avatarColor">{{ initials }}</div>
            <div>
              <div class="dropdown-name">{{ currentUser?.fullName }}</div>
              <span class="role-badge" [class]="getRoleBadgeClass(currentUser?.role)">{{ currentUser?.role }}</span>
            </div>
          </div>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item" (click)="goToSettings()">⚙️ Settings</button>
          <button class="dropdown-item dropdown-logout" (click)="logout()">🚪 Logout</button>
        </div>
      }
    </div>

    <!-- Hamburger -->
    <button class="hamburger" [class.active]="menuOpen" (click)="toggleMenu()" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </div>

</nav>
