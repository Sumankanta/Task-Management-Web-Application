<nav class="navbar">

  <!-- ── Brand ── -->
  <a class="nav-brand" routerLink="/dashboard">
    <div class="nav-logo-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 11l3 3L22 4"/>
        <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
      </svg>
    </div>
    <span class="nav-logo-text">TaskFlow</span>
  </a>

  <!-- ── Right side: dark mode + hamburger (always visible) ── -->
  <div class="nav-controls">

    <!-- Dark Mode Toggle -->
    <button class="dark-toggle" (click)="toggleDarkMode()" [title]="darkMode ? 'Switch to Light' : 'Switch to Dark'">
      <!-- Sun icon (shown in dark mode) -->
      <svg *ngIf="darkMode" width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1"  x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22"   x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1"  y1="12" x2="3"  y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78"  x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
      </svg>
      <!-- Moon icon (shown in light mode) -->
      <svg *ngIf="!darkMode" width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
      </svg>
    </button>

    <!-- Hamburger (mobile only) -->
    <button
      class="hamburger"
      [class.active]="menuOpen"
      (click)="toggleMenu()"
      aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>

  <!-- ── Nav Links ── -->
  <div class="nav-links" [class.open]="menuOpen">

    <a
      routerLink="/dashboard"
      routerLinkActive="active"
      class="nav-link"
      (click)="menuOpen = false">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/>
        <rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/>
      </svg>
      Dashboard
    </a>

    <button class="logout-btn" (click)="logout()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Logout
    </button>

  </div>

</nav>
