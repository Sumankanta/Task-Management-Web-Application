spring.application.name=Task Management Web Application

server.port=8081

# Mysql Database Configuration

# ===============================
# = DATA SOURCE CONFIGURATION
# ===============================

# JDBC URL for MySQL (adjust host, port, and database name)
spring.datasource.url=jdbc:mysql://localhost:3306/taskdb

# Database credentials
spring.datasource.username=root
spring.datasource.password=123456

# MySQL JDBC driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# = JPA / HIBERNATE CONFIGURATION
# ===============================

# Hibernate dialect for MySQL
#spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Automatically create/update tables based on entities
# Options: none, validate, update, create, create-drop
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in the console
spring.jpa.show-sql=true

# Format SQL output for readability
#spring.jpa.properties.hibernate.format_sql=true

# Multipart file upload config
# Server-side size limits ? client also validates before sending
# max-file-size: max size of a single uploaded file
# max-request-size: slightly larger to account for multipart overhead
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# MySQL BLOB support
# Increase packet size to handle LONGBLOB uploads up to 5 MB
# Add this to your MySQL config (my.cnf) too: max_allowed_packet=16M
spring.datasource.hikari.connection-init-sql=SET NAMES utf8mb4
